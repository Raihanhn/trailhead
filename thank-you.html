<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received — Trailhead Auto Concierge</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .thankyou-box {
      max-width: 540px;
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border: 1px solid rgba(199,166,106,.25);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    .thankyou-icon {
      font-size: 3.5rem;
      margin-bottom: 18px;
      display: block;
    }
    .thankyou-box h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      margin-bottom: 14px;
      color: #ffffff;
      line-height: 1.1;
    }
    .thankyou-box p {
      color: #d8cfbf;
      margin-bottom: 28px;
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .thankyou-box .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .95rem;
      text-decoration: none;
      background: linear-gradient(180deg, #c7a66a, #ae8d54);
      color: #131313;
      box-shadow: 0 10px 30px rgba(199,166,106,.25);
      transition: transform .2s ease, filter .2s ease;
      border: none;
      cursor: pointer;
    }
    .thankyou-box .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }
    @media (max-width: 480px) {
      .thankyou-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="thankyou-page">
    <div class="thankyou-box">
      <span class="thankyou-icon">🏔️</span>
      <h1>Request received.</h1>
      <p>
        Thanks for reaching out to Trailhead Auto Concierge.<br>
        I'll be in touch shortly to map out your route.
      </p>
      <a href="/" class="button">← Back to Home</a>
    </div>
  </div>
</body>
</html>
