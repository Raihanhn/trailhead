<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received — Trailhead Auto Concierge</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .thankyou-box {
      max-width: 540px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border: 1px solid rgba(199,166,106,.25);
      border-radius: 28px;
      padding: 48px 40px;
    }
    .thankyou-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .thankyou-box h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      margin-bottom: 14px;
      color: #fff;
    }
    .thankyou-box p {
      color: #d8cfbf;
      margin-bottom: 24px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="thankyou-page">
    <div class="thankyou-box">
      <div class="thankyou-icon">🏔️</div>
      <h1>Request received.</h1>
      <p>
        Thanks for reaching out to Trailhead Auto Concierge.<br>
        I'll be in touch shortly to map out your route.
      </p>
      <a href="/" class="button button-primary">Back to Home</a>
    </div>
  </div>
</body>
</html>
